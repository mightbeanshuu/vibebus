    </linearGradient>
    <linearGradient id="hub" x1="354" y1="96" x2="626" y2="324" gradientUnits="userSpaceOnUse">
      <stop stop-color="#83F7C6"/>
      <stop offset="0.52" stop-color="#62D6FF"/>
