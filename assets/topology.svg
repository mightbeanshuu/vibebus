<svg width="980" height="420" viewBox="0 0 980 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VibeBus topology</title>
  <desc id="desc">Multiple CLI agents connect to one local file-backed VibeBus MCP bus.</desc>
